name: Release

on:
  push:
    tags:
      - 'v*'

permissions: read-all

jobs:
  build-and-release:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download dependencies
        run: make deps

      - name: Verify vendor integrity
        run: make verify-deps

      - name: Build app bundle
        run: make app

      - name: Create ZIP archive
        run: |
          ditto -c -k --keepParent MarkdownViewer.app MarkdownViewer-${{ github.ref_name }}-arm64.zip

      - name: Generate checksums
        run: |
          shasum -a 256 MarkdownViewer-${{ github.ref_name }}-arm64.zip > checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: |
            MarkdownViewer-${{ github.ref_name }}-arm64.zip
            checksums-sha256.txt
          generate_release_notes: true
