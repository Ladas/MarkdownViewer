name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: read-all

jobs:
  build-and-test:
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download vendor dependencies
        run: make deps

      - name: Verify vendor integrity
        run: make verify-deps

      - name: Build (release)
        run: swift build -c release

      - name: Run tests with coverage
        run: swift test --enable-code-coverage

      - name: Generate coverage report
        run: |
          BIN_PATH=$(swift build --show-bin-path)
          PROF_PATH=$(find .build -name "default.profdata" -type f | head -1)
          xcrun llvm-cov export \
            "$BIN_PATH/MarkdownViewerPackageTests.xctest/Contents/MacOS/MarkdownViewerPackageTests" \
            -instr-profile="$PROF_PATH" \
            -ignore-filename-regex='.build|Tests|ContentView|MarkdownWebView|FileWatcher' \
            -format=lcov > coverage.lcov
          xcrun llvm-cov report \
            "$BIN_PATH/MarkdownViewerPackageTests.xctest/Contents/MacOS/MarkdownViewerPackageTests" \
            -instr-profile="$PROF_PATH" \
            -ignore-filename-regex='.build|Tests|ContentView|MarkdownWebView|FileWatcher'

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: coverage.lcov
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Build app bundle
        run: make app

      - name: Verify app bundle
        run: |
          test -f MarkdownViewer.app/Contents/MacOS/MarkdownViewer
          test -f MarkdownViewer.app/Contents/Info.plist
          test -d MarkdownViewer.app/Contents/Resources/MarkdownViewer_MarkdownViewerLib.bundle

  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
