name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download vendor dependencies
        run: make deps

      - name: Verify vendor integrity
        run: make verify-deps

      - name: Build (release)
        run: swift build -c release

      - name: Run tests
        run: swift test

      - name: Build app bundle
        run: make app

      - name: Verify app bundle
        run: |
          test -f MarkdownViewer.app/Contents/MacOS/MarkdownViewer
          test -f MarkdownViewer.app/Contents/Info.plist
          test -d MarkdownViewer.app/Contents/Resources/MarkdownViewer_MarkdownViewerLib.bundle

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@f586c14365d4643c6aa59d472ae6e984bf47bb34 # v2.3.8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
