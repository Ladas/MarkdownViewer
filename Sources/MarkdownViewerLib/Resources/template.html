<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; img-src data: https:; font-src data:;">
    <style>/* {{VENDOR_CSS}} */</style>
    <style>/* {{FA_CSS}} */</style>
    <style>/* {{CSS}} */</style>
    <style id="theme-css"></style>
    <script>/* {{PURIFY_JS}} */</script>
    <script>/* {{MARKED_JS}} */</script>
    <script>/* {{MERMAID_JS}} */</script>
</head>
<body>
    <article class="markdown-body" id="content"></article>

    <script>
    (function() {
        var markdown = `{{MARKDOWN_CONTENT}}`;

        if (typeof marked !== 'undefined') {
            var rawHTML = marked.parse(markdown);
            if (typeof DOMPurify !== 'undefined') {
                rawHTML = DOMPurify.sanitize(rawHTML, {
                    FORBID_TAGS: ['foreignObject'],
                    FORBID_ATTR: ['onerror', 'onload', 'onclick', 'onmouseover', 'onmouseenter',
                        'onfocus', 'onblur', 'onanimationend', 'ontransitionend', 'onpointerover',
                        'onmousedown', 'onmouseup', 'onkeydown', 'onkeyup', 'onsubmit',
                        'xlink:href']
                });
                document.getElementById('content').innerHTML = rawHTML;
            } else {
                // Fail closed: refuse to render unsanitized HTML
                var safeEl = document.getElementById('content');
                var warn = document.createElement('pre');
                warn.textContent = 'Error: DOMPurify not loaded. Run "make deps" to install dependencies.\n\nRaw markdown shown below:\n\n' + markdown;
                safeEl.appendChild(warn);
            }
        } else {
            var el = document.getElementById('content');
            var pre = document.createElement('pre');
            pre.textContent = markdown;
            el.appendChild(pre);
        }

        // Sanitize mermaid text for securityLevel:'loose' while preventing XSS
        function sanitizeMermaidText(text) {
            // 1. Strip HTML tags except <br> and <br/>
            text = text.replace(/<(?!\/?br\s*\/?\s*>)\/?[a-zA-Z][^>]*>/gi, '');
            // 2. Strip mermaid click/href directives (javascript: URI XSS vector)
            text = text.replace(/^\s*click\s+\S+\s+(href|callback)\s+.*$/gim, '');
            text = text.replace(/^\s*click\s+\S+\s+"javascript:.*$/gim, '');
            // 3. Strip url() from style/classDef values (CSS exfiltration)
            text = text.replace(/url\s*\([^)]*\)/gi, 'none');
            // 4. Rename 'default' used as node/subgraph ID (reserved word in mermaid)
            text = text.replace(/\bsubgraph\s+default\b/g, 'subgraph _default');
            text = text.replace(/\bstyle\s+default\b/g, 'style _default');
            return text;
        }

        document.querySelectorAll('code.language-mermaid').forEach(function(el) {
            var pre = el.parentElement;
            var div = document.createElement('pre');
            div.className = 'mermaid';
            var sanitized = sanitizeMermaidText(el.textContent);
            // Replace literal \n with <br/> for line breaks in labels
            sanitized = sanitized.replace(/\\n/g, '<br/>');
            div.textContent = sanitized;
            pre.replaceWith(div);
        });

        // Render review note blocks as styled callouts with Edit button
        var _reviewIndex = 0;
        document.querySelectorAll('code.language-review').forEach(function(el) {
            var pre = el.parentElement;
            var div = document.createElement('div');
            div.className = 'review-note';
            var idx = _reviewIndex++;

            var label = document.createElement('span');
            label.className = 'review-note-label';
            label.textContent = 'Review Note';
            div.appendChild(label);

            var content = document.createElement('div');
            content.className = 'review-note-content';
            content.textContent = el.textContent;
            div.appendChild(content);

            var editBtn = document.createElement('button');
            editBtn.className = 'review-note-edit';
            editBtn.textContent = 'Edit';
            editBtn.onclick = function(e) {
                e.stopPropagation();
                postToHandler('editNote', { index: idx, content: content.textContent });
            };
            div.appendChild(editBtn);

            pre.replaceWith(div);
        });

        // Mermaid init — theme overridable via setMermaidTheme()
        var _mermaidCustomInit = null;
        if (typeof mermaid !== 'undefined') {
            var config = {
                startOnLoad: false,
                securityLevel: 'loose',
                flowchart: { htmlLabels: true, useMaxWidth: true },
                sequence: { useMaxWidth: true },
                gantt: { useMaxWidth: true }
            };
            if (_mermaidCustomInit) {
                Object.assign(config, _mermaidCustomInit);
            } else {
                config.theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'default';
            }
            mermaid.initialize(config);
            mermaid.run()
                .then(addDiagramCopyButtons)
                .catch(function(e) { console.error('Mermaid error:', e); });
        }
    })();
    </script>

    <script>
    // Shared: convert an SVG element to a PNG data URL (2x retina, white bg)
    function svgToPngDataUrl(svg) {
        return new Promise(function(resolve, reject) {
            var rect = svg.getBoundingClientRect();
            var w = Math.ceil(rect.width);
            var h = Math.ceil(rect.height);
            if (w === 0 || h === 0) { reject(new Error('zero size')); return; }

            var clone = svg.cloneNode(true);
            clone.setAttribute('width', w);
            clone.setAttribute('height', h);

            var svgData = new XMLSerializer().serializeToString(clone);
            var encoded = btoa(unescape(encodeURIComponent(svgData)));

            var canvas = document.createElement('canvas');
            var scale = 2;
            canvas.width = w * scale;
            canvas.height = h * scale;
            var ctx = canvas.getContext('2d');
            ctx.scale(scale, scale);
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, w, h);

            var img = new Image();
            img.onload = function() {
                ctx.drawImage(img, 0, 0, w, h);
                resolve(canvas.toDataURL('image/png'));
            };
            img.onerror = function() { reject(new Error('render failed')); };
            img.src = 'data:image/svg+xml;base64,' + encoded;
        });
    }

    // Per-diagram hover copy buttons
    function addDiagramCopyButtons() {
        document.querySelectorAll('pre.mermaid').forEach(function(el) {
            if (el.parentNode.classList && el.parentNode.classList.contains('mermaid-container')) return;
            var svg = el.querySelector('svg');
            if (!svg) return;

            var wrapper = document.createElement('div');
            wrapper.className = 'mermaid-container';
            el.parentNode.insertBefore(wrapper, el);
            wrapper.appendChild(el);

            var btn = document.createElement('button');
            btn.className = 'mermaid-copy-btn';
            btn.textContent = 'Copy diagram';
            btn.onclick = function(e) {
                e.stopPropagation();
                svgToPngDataUrl(svg).then(function(pngUrl) {
                    postToHandler('copyImage', pngUrl);
                    btn.textContent = 'Copied!';
                    setTimeout(function() { btn.textContent = 'Copy diagram'; }, 1500);
                }).catch(function() {
                    btn.textContent = 'Error';
                    setTimeout(function() { btn.textContent = 'Copy diagram'; }, 1500);
                });
            };
            wrapper.appendChild(btn);
        });
    }

    // Shared: clone content, convert mermaid to PNG, clean up artifacts
    async function prepareCleanContent() {
        var content = document.getElementById('content');

        // Convert all mermaid SVGs to PNG using originals (for correct dimensions)
        var origMermaids = content.querySelectorAll('pre.mermaid');
        var pngUrls = [];
        for (var i = 0; i < origMermaids.length; i++) {
            var svg = origMermaids[i].querySelector('svg');
            if (svg) {
                try { pngUrls.push(await svgToPngDataUrl(svg)); }
                catch(e) { pngUrls.push(null); }
            } else {
                pngUrls.push(null);
            }
        }

        // Clone and clean up
        var clone = content.cloneNode(true);

        // Remove UI artifacts
        clone.querySelectorAll('.mermaid-copy-btn').forEach(function(b) { b.remove(); });
        clone.querySelectorAll('mark.search-highlight').forEach(function(m) {
            m.parentNode.replaceChild(document.createTextNode(m.textContent), m);
        });

        // Replace mermaid diagrams with PNG images
        var cloneMermaids = clone.querySelectorAll('pre.mermaid');
        cloneMermaids.forEach(function(pre, i) {
            if (!pngUrls[i]) return;
            var img = document.createElement('img');
            img.src = pngUrls[i];
            img.style.maxWidth = '100%';
            var container = pre.closest('.mermaid-container');
            (container || pre).replaceWith(img);
        });

        // Convert standalone SVGs to PNG for copy/export
        var standaloneSvgs = clone.querySelectorAll('svg:not(.mermaid svg)');
        for (var si = 0; si < standaloneSvgs.length; si++) {
            var svg = standaloneSvgs[si];
            if (svg.closest('.mermaid-container') || svg.closest('pre.mermaid')) continue;
            try {
                var pngUrl = await svgToPngDataUrl(svg);
                var img = document.createElement('img');
                img.src = pngUrl;
                img.style.maxWidth = '100%';
                svg.replaceWith(img);
            } catch(e) {}
        }

        // Inline computed styles for Google Docs compatibility
        // Uses getComputedStyle on live DOM to pick up theme colors
        function cs(selector, idx) {
            var el = content.querySelectorAll(selector)[idx || 0];
            return el ? window.getComputedStyle(el) : null;
        }

        // Sample computed colors from live DOM (with theme applied)
        var thBg = (cs('th') || {}).backgroundColor || '#f6f8fa';
        var thColor = (cs('th') || {}).color || '#000';
        var thBorder = (cs('th') || {}).borderColor || '#d0d7de';
        var tdBorder = (cs('td') || {}).borderColor || '#d0d7de';
        var h1Color = (cs('h1') || {}).color || 'inherit';
        var h1Border = (cs('h1') || {}).borderBottomColor || '#d0d7de';
        var bqBorder = (cs('blockquote') || {}).borderLeftColor || '#d0d7de';
        var bqColor = (cs('blockquote') || {}).color || '#656d76';
        var codeBg = (cs('code') || {}).backgroundColor || 'rgba(175,184,193,0.2)';
        var codeColor = (cs('code') || {}).color || 'inherit';
        var preBg = (cs('pre:not(.mermaid)') || {}).backgroundColor || '#f6f8fa';
        var preBorder = (cs('pre:not(.mermaid)') || {}).borderLeftColor || 'transparent';
        var linkColor = (cs('a') || {}).color || '#0969da';

        // Convert rgb() to hex for Google Docs compatibility
        function rgbToHex(rgb) {
            if (!rgb || rgb.indexOf('rgb') === -1) return rgb;
            var parts = rgb.match(/\d+/g);
            if (!parts || parts.length < 3) return rgb;
            return '#' + parts.slice(0, 3).map(function(x) {
                return ('0' + parseInt(x).toString(16)).slice(-2);
            }).join('');
        }
        var thBgHex = rgbToHex(thBg);
        var thColorHex = rgbToHex(thColor);

        // Google Docs table styling: use HTML attributes (bgcolor, border, width)
        // CSS properties are often stripped or ignored
        clone.querySelectorAll('table').forEach(function(table) {
            table.setAttribute('border', '1');
            table.setAttribute('cellpadding', '8');
            table.setAttribute('cellspacing', '0');
            table.setAttribute('width', '100%');
            table.style.borderCollapse = 'collapse';
            table.style.marginBottom = '16px';
        });
        clone.querySelectorAll('th').forEach(function(th) {
            th.setAttribute('bgcolor', thBgHex);
            th.style.cssText = 'padding:8px 12px;font-weight:600;text-align:left;color:' + thColorHex + ';background-color:' + thBgHex;
            // Unwrap inline elements — flatten to plain text with styling
            // This prevents Google Docs from adding white text backgrounds
            var text = th.textContent;
            th.textContent = text;
            th.setAttribute('bgcolor', thBgHex);
            th.style.color = thColorHex;
            th.style.backgroundColor = thBgHex;
            th.style.fontWeight = '600';
            th.style.padding = '8px 12px';
        });
        clone.querySelectorAll('td').forEach(function(td) {
            td.style.cssText = 'padding:8px 12px;text-align:left;vertical-align:top';
        });
        clone.querySelectorAll('pre').forEach(function(pre) {
            if (pre.classList.contains('mermaid')) return;
            pre.style.backgroundColor = preBg;
            pre.style.borderLeft = '3px solid ' + preBorder;
            pre.style.borderRadius = '6px';
            pre.style.padding = '16px';
            pre.style.overflow = 'auto';
            pre.style.fontSize = '13px';
            pre.style.lineHeight = '1.45';
            pre.style.marginBottom = '16px';
        });
        clone.querySelectorAll('code').forEach(function(code) {
            code.style.fontFamily = 'SF Mono, Menlo, Consolas, monospace';
            code.style.fontSize = '13px';
            code.style.color = codeColor;
            if (!code.parentElement || code.parentElement.tagName !== 'PRE') {
                code.style.backgroundColor = codeBg;
                code.style.borderRadius = '3px';
                code.style.padding = '2px 5px';
            }
        });
        clone.querySelectorAll('blockquote').forEach(function(bq) {
            bq.style.borderLeft = '4px solid ' + bqBorder;
            bq.style.color = bqColor;
            bq.style.paddingLeft = '16px';
            bq.style.marginLeft = '0';
        });
        clone.querySelectorAll('h1,h2,h3,h4,h5,h6').forEach(function(h) {
            h.style.fontWeight = '600';
            h.style.color = h1Color;
            h.style.backgroundColor = 'transparent';
            h.style.marginTop = '24px';
            h.style.marginBottom = '16px';
        });
        clone.querySelectorAll('h1,h2').forEach(function(h) {
            h.style.borderBottom = '1px solid ' + h1Border;
            h.style.paddingBottom = '8px';
        });
        clone.querySelectorAll('a').forEach(function(a) {
            a.style.color = linkColor;
            a.style.backgroundColor = 'transparent';
        });

        clone.normalize();
        return clone;
    }

    // Build standalone HTML from rendered content
    // mode: 'auto' (include media queries), 'light', or 'dark'
    async function buildStandaloneHTML(mode) {
        var clone = await prepareCleanContent();

        // Collect only essential CSS (skip Font Awesome and mermaid — diagrams are PNGs)
        var styles = '';
        for (var i = 0; i < document.styleSheets.length; i++) {
            try {
                var rules = document.styleSheets[i].cssRules;
                if (!rules || rules.length === 0) continue;
                // Skip Font Awesome (huge base64 fonts, ~1.2MB)
                var first = rules[0].cssText || '';
                if (first.indexOf('font-awesome') !== -1 || first.indexOf('FontAwesome') !== -1 ||
                    first.indexOf('fa-') !== -1) continue;
                for (var j = 0; j < rules.length; j++) {
                    var rule = rules[j];
                    var ruleText = rule.cssText || '';
                    // Skip @font-face rules (base64 font data)
                    if (rule.type === CSSRule.FONT_FACE_RULE) continue;
                    // Skip mermaid-specific rules (diagrams are PNGs in copy)
                    if (ruleText.indexOf('.mermaid') !== -1 && ruleText.indexOf('.mermaid-c') === -1) continue;
                    if (mode === 'light' && rule.type === CSSRule.MEDIA_RULE &&
                        rule.conditionText && rule.conditionText.indexOf('dark') !== -1) {
                        continue;
                    }
                    if (mode === 'dark' && rule.type === CSSRule.MEDIA_RULE &&
                        rule.conditionText && rule.conditionText.indexOf('dark') !== -1) {
                        for (var k = 0; k < rule.cssRules.length; k++) {
                            styles += rule.cssRules[k].cssText + '\n';
                        }
                        continue;
                    }
                    styles += ruleText + '\n';
                }
            } catch(e) {}
        }

        if (mode === 'light') {
            styles += '\nbody { background: #ffffff !important; color: #1f2328 !important; }\n';
        } else if (mode === 'dark') {
            styles += '\nbody { background: #0d1117 !important; color: #e6edf3 !important; }\n';
        }

        var colorScheme = mode === 'dark' ? 'dark' : 'light';
        var meta = mode !== 'auto' ? '<meta name="color-scheme" content="' + colorScheme + '">\n' : '';

        return '<!DOCTYPE html>\n<html>\n<head>\n<meta charset="utf-8">\n' + meta + '<style>\n'
            + styles
            + '</style>\n</head>\n<body>\n<article class="markdown-body">\n'
            + clone.innerHTML
            + '\n</article>\n</body>\n</html>';
    }

    // Helper: rgb() to hex
    function rgbToHex(rgb) {
        if (!rgb || rgb.indexOf('rgb') === -1) return rgb || '#000000';
        var parts = rgb.match(/\d+/g);
        if (!parts || parts.length < 3) return rgb;
        return '#' + parts.slice(0, 3).map(function(x) {
            return ('0' + parseInt(x).toString(16)).slice(-2);
        }).join('');
    }

    function escapeHtml(text) {
        return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // Copy for Google Docs — Google Docs native clipboard format
    async function copyForGoogleDocs() {
        try {
            var clone = await prepareCleanContent();
            var content = document.getElementById('content');

            // Sample colors from live DOM
            function cs(sel) {
                var el = content.querySelector(sel);
                return el ? window.getComputedStyle(el) : {};
            }
            var thBg = rgbToHex((cs('th') || {}).backgroundColor || '#f6f8fa');
            var thColor = rgbToHex((cs('th') || {}).color || '#000000');
            var hColor = rgbToHex((cs('h1') || {}).color || '#000000');

            // Strip classes/ids
            clone.querySelectorAll('[class],[id]').forEach(function(el) {
                el.removeAttribute('class');
                el.removeAttribute('id');
            });

            var cellBorder = 'border-left:solid #000 1pt;border-right:solid #000 1pt;border-bottom:solid #000 1pt;border-top:solid #000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word';

            clone.querySelectorAll('table').forEach(function(table) {
                table.removeAttribute('border');
                table.removeAttribute('cellpadding');
                table.removeAttribute('cellspacing');
                table.removeAttribute('width');
                table.style.cssText = 'border:none;border-collapse:collapse;width:100%;table-layout:auto';
            });

            // Google Docs strips background-color from cells on paste.
            // Use dark text on light bg — always readable after paste.
            var headerBg = thBg;
            var headerColor = thColor;
            // If text is white/light, swap to dark-on-light
            var r = parseInt(thColor.slice(1,3),16)||0, g = parseInt(thColor.slice(3,5),16)||0, b = parseInt(thColor.slice(5,7),16)||0;
            if ((r+g+b) > 500) { // light text color
                headerColor = thBg; // use bg color as text (dark blue)
                // light tint of the bg color
                var br = parseInt(thBg.slice(1,3),16)||200, bg2 = parseInt(thBg.slice(3,5),16)||200, bb = parseInt(thBg.slice(5,7),16)||200;
                headerBg = '#' + [br,bg2,bb].map(function(c){ return ('0'+Math.round(c+(255-c)*0.8).toString(16)).slice(-2); }).join('');
            }

            clone.querySelectorAll('th').forEach(function(th) {
                var text = th.textContent;
                var td = document.createElement('td');
                td.setAttribute('bgcolor', headerBg);
                td.style.cssText = cellBorder + ';background-color:' + headerBg + ';text-align:left';
                td.innerHTML = '<b><font color="' + headerColor + '">' + escapeHtml(text) + '</font></b>';
                th.parentNode.replaceChild(td, th);
            });

            // Regular cells with alternating row colors
            var allRows = clone.querySelectorAll('tr');
            for (var ri = 0; ri < allRows.length; ri++) {
                var cells = allRows[ri].querySelectorAll('td');
                for (var ci = 0; ci < cells.length; ci++) {
                    var td = cells[ci];
                    if (td.style.cssText && td.style.cssText.indexOf('border-left') !== -1) continue;
                    var rowBg = (ri % 2 === 1) ? '#f6f8fa' : '#ffffff';
                    td.setAttribute('bgcolor', rowBg);
                    td.style.cssText = cellBorder + ';text-align:left;background-color:' + rowBg;
                }
            }

            clone.querySelectorAll('img').forEach(function(img) {
                img.style.maxWidth = '100%';
            });

            clone.querySelectorAll('h1,h2,h3,h4,h5,h6').forEach(function(h) {
                h.removeAttribute('style');
                h.style.color = hColor;
            });

            clone.querySelectorAll('pre').forEach(function(pre) {
                pre.removeAttribute('style');
                pre.style.cssText = 'background-color:#f6f8fa;padding:12px;font-family:monospace;font-size:12px';
            });

            clone.querySelectorAll('blockquote').forEach(function(bq) {
                bq.removeAttribute('style');
                bq.style.cssText = 'border-left:4px solid #ccc;padding-left:16px;margin-left:0;color:#555';
            });

            var guid = 'xxxxxxxx-xxxx-4xxx'.replace(/x/g, function() { return (Math.random()*16|0).toString(16); });
            var html = '<meta charset="utf-8"><b style="font-weight:normal;" id="docs-internal-guid-' + guid + '">' + clone.innerHTML + '</b>';
            postToHandler('copyGoogleDocs', html);
        } catch(e) {
            console.error('GDoc copy error:', e);
            // Fallback: copy plain innerHTML
            var fallback = document.getElementById('content').innerHTML;
            postToHandler('copyGoogleDocs', fallback);
        }
    }

    function postToHandler(name, body) {
        if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers[name]) {
            window.webkit.messageHandlers[name].postMessage(body);
        }
    }

    async function copyRenderedContent(mode) {
        postToHandler('copyRendered', await buildStandaloneHTML(mode || 'auto'));
    }

    async function exportHTMLContent(mode) {
        postToHandler('exportHTML', await buildStandaloneHTML(mode || 'auto'));
    }
    </script>

    <script>
    // Click-drag panning when zoomed
    var _pan = { active: false, startX: 0, startY: 0, scrollX: 0, scrollY: 0 };

    function isOverflowing() {
        return document.documentElement.scrollWidth > window.innerWidth + 1 ||
               document.documentElement.scrollHeight > window.innerHeight + 1;
    }

    // Option+click-drag to pan (normal click-drag selects text)
    document.addEventListener('mousedown', function(e) {
        if (e.button !== 0) return;
        if (!e.altKey) return;
        if (e.target.closest('a, button, input, textarea, .mermaid-copy-btn')) return;
        if (!isOverflowing()) return;

        _pan.active = true;
        _pan.startX = e.clientX;
        _pan.startY = e.clientY;
        _pan.scrollX = window.scrollX;
        _pan.scrollY = window.scrollY;
        document.body.classList.add('panning');
        e.preventDefault();
    });

    document.addEventListener('mousemove', function(e) {
        if (!_pan.active) return;
        window.scrollTo(
            _pan.scrollX - (e.clientX - _pan.startX),
            _pan.scrollY - (e.clientY - _pan.startY)
        );
    });

    document.addEventListener('mouseup', function() {
        if (_pan.active) {
            _pan.active = false;
            document.body.classList.remove('panning');
        }
    });

    // Update cursor when zoom changes
    new MutationObserver(function() {
        document.body.classList.toggle('pannable', isOverflowing());
    }).observe(document.documentElement, { attributes: true });
    window.addEventListener('resize', function() {
        document.body.classList.toggle('pannable', isOverflowing());
    });
    </script>

    <script>
    // Search functionality
    var _searchMarks = [];
    var _currentIndex = -1;

    function performSearch(query) {
        clearSearch();
        if (!query) return {total: 0, current: 0};

        var content = document.getElementById('content');
        var walker = document.createTreeWalker(content, NodeFilter.SHOW_TEXT);
        var textNodes = [];
        while (walker.nextNode()) textNodes.push(walker.currentNode);

        var lowerQuery = query.toLowerCase();

        textNodes.forEach(function(textNode) {
            var text = textNode.textContent;
            var lower = text.toLowerCase();
            var idx = lower.indexOf(lowerQuery);
            if (idx === -1) return;

            var frag = document.createDocumentFragment();
            var lastIdx = 0;

            while (idx !== -1) {
                if (idx > lastIdx) {
                    frag.appendChild(document.createTextNode(text.substring(lastIdx, idx)));
                }
                var mark = document.createElement('mark');
                mark.className = 'search-highlight';
                mark.textContent = text.substring(idx, idx + query.length);
                frag.appendChild(mark);
                _searchMarks.push(mark);
                lastIdx = idx + query.length;
                idx = lower.indexOf(lowerQuery, lastIdx);
            }

            if (lastIdx < text.length) {
                frag.appendChild(document.createTextNode(text.substring(lastIdx)));
            }

            textNode.parentNode.replaceChild(frag, textNode);
        });

        if (_searchMarks.length > 0) {
            _currentIndex = 0;
            _searchMarks[0].classList.add('current');
            _searchMarks[0].scrollIntoView({behavior: 'smooth', block: 'center'});
        }

        return {total: _searchMarks.length, current: _searchMarks.length > 0 ? 1 : 0};
    }

    function navigateSearch(direction) {
        if (_searchMarks.length === 0) return {total: 0, current: 0};

        _searchMarks[_currentIndex].classList.remove('current');

        if (direction === 'next') {
            _currentIndex = (_currentIndex + 1) % _searchMarks.length;
        } else {
            _currentIndex = (_currentIndex - 1 + _searchMarks.length) % _searchMarks.length;
        }

        _searchMarks[_currentIndex].classList.add('current');
        _searchMarks[_currentIndex].scrollIntoView({behavior: 'smooth', block: 'center'});

        return {total: _searchMarks.length, current: _currentIndex + 1};
    }

    function clearSearch() {
        _searchMarks.forEach(function(mark) {
            mark.parentNode.replaceChild(document.createTextNode(mark.textContent), mark);
        });
        document.getElementById('content').normalize();
        _searchMarks = [];
        _currentIndex = -1;
        return {total: 0, current: 0};
    }
    </script>

    <script>
    // Table of Contents: scroll to heading by index
    function scrollToHeading(index) {
        var headings = document.getElementById('content').querySelectorAll('h1, h2, h3, h4, h5, h6');
        if (index >= 0 && index < headings.length) {
            headings[index].scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
    }

    // Cmd+double-click to add a review note at nearest heading
    document.addEventListener('dblclick', function(e) {
        if (!e.metaKey) return;
        e.preventDefault();

        // Find the nearest preceding heading
        var node = e.target;
        var headingText = '';
        while (node && node !== document.body) {
            if (/^H[1-6]$/.test(node.tagName)) {
                headingText = node.textContent;
                break;
            }
            // Check previous siblings for headings
            var prev = node.previousElementSibling;
            while (prev) {
                if (/^H[1-6]$/.test(prev.tagName)) {
                    headingText = prev.textContent;
                    break;
                }
                prev = prev.previousElementSibling;
            }
            if (headingText) break;
            node = node.parentElement;
        }

        postToHandler('addNoteAtHeading', { heading: headingText });
    });

    // Show link URLs on hover via title attribute
    document.querySelectorAll('#content a[href]').forEach(function(a) {
        if (!a.title) a.title = a.getAttribute('href');
    });

    // Anchor link scrolling (loadHTMLString has no base URL, so handle in JS)
    document.addEventListener('click', function(e) {
        var link = e.target.closest('a');
        if (!link) return;
        var href = link.getAttribute('href');
        if (!href || href.charAt(0) !== '#') return;
        e.preventDefault();
        var target = document.getElementById(href.substring(1));
        if (target) {
            target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
    });

    // Mermaid theme change requires full page reload (SVGs have baked-in colors)
    // The Swift side triggers a content reload which preserves scroll position

    // Content width control
    // Apply theme CSS for tables, headings, etc.
    function setThemeCSS(css) {
        var el = document.getElementById('theme-css');
        if (el) el.textContent = css;
    }

    function setContentWidth(px) {
        document.getElementById('content').style.maxWidth = px + 'px';
    }

    </script>
</body>
